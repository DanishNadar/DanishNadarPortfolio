<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta name="description" content="Contact Danish Nadar." />
  <link rel="icon" type="image/png" href="../assets/images/favicon.png" />
  <link rel="stylesheet" href="../assets/styles.css?v=28" />
  <title>Contact · Danish Nadar</title>
</head>
<body>
  <div class="shell">
    <div data-nav></div>
    <main class="page container" id="call">
      <section class="section-block fade-up">
        <span class="eyebrow">Let’s connect</span>
        <h1 class="page-title">Contact Danish</h1>
        <p class="lead short">For roles, consulting, collaboration, or a project conversation.</p>
      </section>
      <section class="section contact-layout">
        <div class="contact-grid" data-contact-grid></div>
        <div class="panel fade-up">
          <h2 class="section-title" style="font-size:1.8rem;">Send a direct note</h2>
          <p class="section-copy">This form opens an email draft so the site stays simple and fast.</p>
          <form class="form-shell" data-contact-form style="margin-top:18px;">
            <div class="field">
              <label>Name</label>
              <input name="name" placeholder="Your name" required />
            </div>
            <div class="field">
              <label>Email</label>
              <input name="email" type="email" placeholder="your@email.com" required />
            </div>
            <div class="field">
              <label>Topic</label>
              <input name="topic" placeholder="AI role, consulting, collaboration..." />
            </div>
            <div class="field">
              <label>Message</label>
              <textarea name="message" placeholder="Tell Danish what you want to discuss."></textarea>
            </div>
            <button class="cta-btn" type="submit">Open email draft</button>
          </form>
        </div>
      </section>
    </main>
    <div data-footer></div>
  </div>
  <script src="../assets/data.js?v=28"></script>
  <script src="../assets/main.js?v=28"></script>
</body>
</html>
